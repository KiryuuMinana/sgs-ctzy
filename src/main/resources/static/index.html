<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国杀TCG - 抽卡模拟器</title>
    <style>
        /* ====== 基础重置与全局 ====== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --wei-color: #4a90d9;
            --wei-glow: #4a90d966;
            --shu-color: #d94a4a;
            --shu-glow: #d94a4a66;
            --wu-color: #4ad97a;
            --wu-glow: #4ad97a66;
            --qun-color: #9b59b6;
            --qun-glow: #9b59b666;
            --gold: #d4a843;
            --gold-light: #f0d68a;
            --bg-dark: #0a0a12;
            --bg-card: #1a1a2e;
            --text-primary: #e8e0d0;
            --text-secondary: #a09880;
            --border-subtle: #333355;
        }

        body {
            font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'FangSong', serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ====== 背景装饰 ====== */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(74, 144, 217, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(217, 74, 74, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 0%, rgba(212, 168, 67, 0.08) 0%, transparent 40%),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 50px,
                    rgba(212, 168, 67, 0.02) 50px,
                    rgba(212, 168, 67, 0.02) 51px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 50px,
                    rgba(212, 168, 67, 0.02) 50px,
                    rgba(212, 168, 67, 0.02) 51px
                );
        }

        .bg-particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ====== 主容器（左中右网格布局） ====== */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1520px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 300px;
            gap: 20px;
            align-items: start;
        }

        /* 主内容区：保持原有纵向flex布局 */
        .main-content {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        /* ====== 标题区 ====== */
        .app-header {
            text-align: center;
            padding: 20px 0 10px;
        }

        .app-title {
            font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', cursive;
            font-size: 2.8em;
            background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 8px;
            position: relative;
            display: inline-block;
        }

        .app-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 10%;
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .app-subtitle {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-top: 8px;
            letter-spacing: 3px;
        }

        /* ====== 玩家区域 ====== */
        .player-zone {
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            margin: 10px 0;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            position: relative;
            transition: all 0.5s ease;
        }

        .player-zone::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: 12px 12px 0 0;
            transition: all 0.5s ease;
        }

        .player-zone.first-player::before {
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .player-zone.second-player::before {
            background: linear-gradient(90deg, transparent, #8888cc, transparent);
        }

        .player-zone.active {
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(212, 168, 67, 0.15), inset 0 0 30px rgba(212, 168, 67, 0.03);
        }

        .player-zone.active::before {
            height: 4px;
            box-shadow: 0 0 15px var(--gold);
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-badge {
            font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', cursive;
            font-size: 1.4em;
            padding: 4px 16px;
            border-radius: 6px;
            letter-spacing: 3px;
        }

        .first-player .player-badge {
            background: linear-gradient(135deg, #8b6914, #d4a843);
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .second-player .player-badge {
            background: linear-gradient(135deg, #4444aa, #6666cc);
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .deck-name {
            font-size: 1em;
            color: var(--text-secondary);
            font-style: italic;
        }

        .player-stats {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .stat-value {
            font-weight: bold;
            color: var(--gold-light);
            font-size: 1.1em;
        }

        /* ====== 下拉框 ====== */
        .deck-select-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .deck-select-wrapper label {
            font-size: 0.9em;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .deck-select {
            background: rgba(40, 40, 70, 0.9);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 6px 12px;
            font-family: 'Noto Serif SC', serif;
            font-size: 0.9em;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
            min-width: 180px;
        }

        .deck-select:hover {
            border-color: var(--gold);
        }

        .deck-select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 168, 67, 0.2);
        }

        .deck-select option {
            background: #1a1a2e;
            color: var(--text-primary);
        }

        /* ====== 武将卡区域 ====== */
        .cards-area {
            min-height: 140px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px 0;
            position: relative;
        }

        .cards-area.empty::after {
            content: '暂无武将上阵';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--text-secondary);
            font-size: 0.9em;
            opacity: 0.5;
        }

        /* ====== 武将卡 ====== */
        .general-card {
            width: 100px;
            height: 140px;
            border-radius: 8px;
            position: relative;
            cursor: default;
            perspective: 600px;
            animation: cardAppear 0.6s ease-out;
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: scale(0.5) rotateY(180deg);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.1) rotateY(90deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateY(0deg);
            }
        }

        .general-card-inner {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            position: relative;
            overflow: visible;
            border: 2px solid;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .general-card:hover .general-card-inner {
            transform: translateY(-5px);
        }

        /* 势力颜色 */
        .general-card.faction-wei .general-card-inner {
            border-color: var(--wei-color);
            box-shadow: 0 0 12px var(--wei-glow);
            background: linear-gradient(180deg, #1a2a4a 0%, #0d1a30 100%);
        }
        .general-card.faction-wei:hover .general-card-inner {
            box-shadow: 0 4px 20px var(--wei-glow);
        }

        .general-card.faction-shu .general-card-inner {
            border-color: var(--shu-color);
            box-shadow: 0 0 12px var(--shu-glow);
            background: linear-gradient(180deg, #3a1a1a 0%, #2a0d0d 100%);
        }
        .general-card.faction-shu:hover .general-card-inner {
            box-shadow: 0 4px 20px var(--shu-glow);
        }

        .general-card.faction-wu .general-card-inner {
            border-color: var(--wu-color);
            box-shadow: 0 0 12px var(--wu-glow);
            background: linear-gradient(180deg, #1a3a1a 0%, #0d2a0d 100%);
        }
        .general-card.faction-wu:hover .general-card-inner {
            box-shadow: 0 4px 20px var(--wu-glow);
        }

        .general-card.faction-qun .general-card-inner {
            border-color: var(--qun-color);
            box-shadow: 0 0 12px var(--qun-glow);
            background: linear-gradient(180deg, #2a1a3a 0%, #1a0d2a 100%);
        }
        .general-card.faction-qun:hover .general-card-inner {
            box-shadow: 0 4px 20px var(--qun-glow);
        }

        /* 新抽出的卡高亮 */
        .general-card.new-draw .general-card-inner {
            animation: cardGlow 1.5s ease-in-out;
        }

        @keyframes cardGlow {
            0% { filter: brightness(1); }
            30% { filter: brightness(1.8); }
            100% { filter: brightness(1); }
        }

        /* 卡片装饰边框 */
        .card-border-decor {
            position: absolute;
            top: 3px; left: 3px; right: 3px; bottom: 3px;
            border: 1px solid rgba(212, 168, 67, 0.3);
            border-radius: 5px;
            pointer-events: none;
        }

        .card-border-decor::before,
        .card-border-decor::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border: 1px solid rgba(212, 168, 67, 0.5);
        }

        .card-border-decor::before {
            top: 2px; left: 2px;
            border-right: none; border-bottom: none;
        }

        .card-border-decor::after {
            bottom: 2px; right: 2px;
            border-left: none; border-top: none;
        }

        /* 卡片图片区域 */
        .card-image-area {
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            position: relative;
            margin-top: 15px; /* 调整小图标位置，向下移动约四分之一 */
        }

        .card-image-area img {
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            object-position: bottom center;
        }

        .card-image-placeholder {
            font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', cursive;
            font-size: 2em;
            opacity: 0.6;
        }

        .faction-wei .card-image-placeholder { color: var(--wei-color); }
        .faction-shu .card-image-placeholder { color: var(--shu-color); }
        .faction-wu .card-image-placeholder { color: var(--wu-color); }
        .faction-qun .card-image-placeholder { color: var(--qun-color); }

        /* 卡片名称区域 */
        .card-name-area {
            text-align: center;
            padding: 4px 5px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(212, 168, 67, 0.2);
        }

        .card-name {
            font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', cursive;
            font-size: 1.05em;
            color: var(--gold-light);
            letter-spacing: 2px;
        }

        .card-faction-tag {
            font-size: 0.7em;
            padding: 1px 6px;
            border-radius: 3px;
            display: inline-block;
            margin-top: 2px;
        }

        .faction-wei .card-faction-tag { background: var(--wei-color); color: #fff; }
        .faction-shu .card-faction-tag { background: var(--shu-color); color: #fff; }
        .faction-wu .card-faction-tag { background: var(--wu-color); color: #fff; }
        .faction-qun .card-faction-tag { background: var(--qun-color); color: #fff; }

        /* ====== 中间控制区 ====== */
        .control-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Noto Serif SC', serif;
            font-size: 1em;
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
        }

        .btn-start {
            background: linear-gradient(135deg, #8b6914, #d4a843);
            color: #fff;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(212, 168, 67, 0.3);
        }

        .btn-start:hover:not(:disabled) {
            background: linear-gradient(135deg, #d4a843, #f0d68a);
            box-shadow: 0 6px 25px rgba(212, 168, 67, 0.4);
            transform: translateY(-2px);
        }

        .btn-next {
            background: linear-gradient(135deg, #2a5a2a, #3a8a3a);
            color: #fff;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(74, 217, 122, 0.2);
        }

        .btn-next:hover:not(:disabled) {
            background: linear-gradient(135deg, #3a8a3a, #4ad97a);
            box-shadow: 0 6px 25px rgba(74, 217, 122, 0.3);
            transform: translateY(-2px);
        }

        .btn-reset {
            background: rgba(80, 80, 100, 0.6);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
        }

        .btn-reset:hover:not(:disabled) {
            background: rgba(100, 100, 130, 0.6);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ====== 状态信息条 ====== */
        .status-bar {
            text-align: center;
            padding: 8px;
            margin: 5px 0;
            font-size: 0.9em;
            color: var(--text-secondary);
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .status-bar .turn-info {
            color: var(--gold-light);
            font-weight: bold;
        }

        .status-bar .next-action {
            padding: 3px 12px;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .next-action.first {
            background: rgba(212, 168, 67, 0.2);
            border: 1px solid rgba(212, 168, 67, 0.4);
            color: var(--gold-light);
        }

        .next-action.second {
            background: rgba(100, 100, 200, 0.2);
            border: 1px solid rgba(100, 100, 200, 0.4);
            color: #aab;
        }

        /* ====== 提示消息（Toast） ====== */
        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.95em;
            animation: toastIn 0.4s ease-out, toastOut 0.4s ease-in forwards;
            animation-delay: 0s, 2.5s;
            pointer-events: auto;
            text-align: center;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .toast.info {
            background: rgba(74, 144, 217, 0.9);
            color: #fff;
            border: 1px solid rgba(74, 144, 217, 0.5);
            box-shadow: 0 4px 20px rgba(74, 144, 217, 0.3);
        }

        .toast.success {
            background: rgba(74, 217, 122, 0.9);
            color: #fff;
            border: 1px solid rgba(74, 217, 122, 0.5);
            box-shadow: 0 4px 20px rgba(74, 217, 122, 0.3);
        }

        .toast.warning {
            background: rgba(212, 168, 67, 0.9);
            color: #fff;
            border: 1px solid rgba(212, 168, 67, 0.5);
            box-shadow: 0 4px 20px rgba(212, 168, 67, 0.3);
        }

        .toast.error {
            background: rgba(217, 74, 74, 0.9);
            color: #fff;
            border: 1px solid rgba(217, 74, 74, 0.5);
            box-shadow: 0 4px 20px rgba(217, 74, 74, 0.3);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* ====== 战场分割线 ====== */
        .battlefield-divider {
            position: relative;
            text-align: center;
            padding: 5px 0;
        }

        .battlefield-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-subtle), var(--gold), var(--border-subtle), transparent);
        }

        .battlefield-divider span {
            position: relative;
            background: var(--bg-dark);
            padding: 0 15px;
            font-size: 0.8em;
            color: var(--text-secondary);
            letter-spacing: 5px;
        }

        /* ====== 粒子效果 ====== */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
        }

        /* ====== 抽卡特效 ====== */
        .draw-effect {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .draw-flash {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(212, 168, 67, 0.3), transparent 70%);
            animation: drawFlash 0.8s ease-out forwards;
        }

        @keyframes drawFlash {
            0% { opacity: 0; }
            30% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ====== 响应式 ====== */
        @media (max-width: 768px) {
            .app-title { font-size: 2em; letter-spacing: 4px; }
            .player-header { flex-direction: column; align-items: flex-start; }
            .general-card { width: 80px; height: 112px; }
            .card-image-area { height: 55px; margin-top: 12px; }
            .card-name { font-size: 0.9em; }
            .btn { padding: 8px 20px; font-size: 0.9em; }
            .cards-area { gap: 6px; }
            .battle-log { max-height: 120px; }
            .skill-modal-image { min-height: 220px; }
            .skill-modal-image img { max-height: 300px; }
        }

        @media (max-width: 480px) {
            .app-title { font-size: 1.6em; letter-spacing: 2px; }
            .general-card { width: 70px; height: 98px; }
            .card-image-area { height: 48px; margin-top: 10px; }
            .card-image-placeholder { font-size: 1.5em; }
            .card-name { font-size: 0.8em; }
            .player-stats { flex-direction: column; gap: 5px; }
            .battle-log { max-height: 80px; }
            .skill-modal-image { min-height: 180px; }
            .skill-modal-image img { max-height: 250px; }
        }

        /* ====== 势力图标 ====== */
        .faction-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 3px;
            text-align: center;
            line-height: 20px;
            font-size: 0.75em;
            font-weight: bold;
            color: #fff;
            margin-right: 5px;
        }

        .faction-icon.wei { background: var(--wei-color); }
        .faction-icon.shu { background: var(--shu-color); }
        .faction-icon.wu { background: var(--wu-color); }
        .faction-icon.qun { background: var(--qun-color); }

        /* ====== 军营剩余指示 ====== */
        .camp-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .camp-bar {
            width: 60px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .camp-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .first-player .camp-bar-fill { background: linear-gradient(90deg, var(--gold), var(--gold-light)); }
        .second-player .camp-bar-fill { background: linear-gradient(90deg, #6666cc, #8888ee); }

        /* ====== 战斗日志 ====== */
        .battle-log {
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            background: rgba(15, 15, 30, 0.9);
            padding: 10px 15px;
            max-height: 160px;
            overflow-y: auto;
            margin: 8px 0;
            font-size: 0.82em;
            line-height: 1.6;
            color: var(--text-secondary);
            scrollbar-width: thin;
            scrollbar-color: rgba(212,168,67,0.3) transparent;
        }

        .battle-log::-webkit-scrollbar {
            width: 4px;
        }

        .battle-log::-webkit-scrollbar-track {
            background: transparent;
        }

        .battle-log::-webkit-scrollbar-thumb {
            background: rgba(212,168,67,0.3);
            border-radius: 2px;
        }

        .battle-log .log-title {
            font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', cursive;
            font-size: 1.1em;
            color: var(--gold-light);
            margin-bottom: 5px;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(212,168,67,0.2);
            padding-bottom: 3px;
        }

        .battle-log .log-entry {
            padding: 2px 0;
            animation: logAppear 0.3s ease-out;
        }

        @keyframes logAppear {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-entry .log-turn {
            color: var(--gold);
            font-weight: bold;
        }

        .log-entry .log-player-first {
            color: var(--gold-light);
        }

        .log-entry .log-player-second {
            color: #aab;
        }

        .log-entry .log-cards {
            color: var(--text-primary);
        }

        .log-entry .log-faction-wei { color: var(--wei-color); }
        .log-entry .log-faction-shu { color: var(--shu-color); }
        .log-entry .log-faction-wu { color: var(--wu-color); }
        .log-entry .log-faction-qun { color: var(--qun-color); }

        /* ====== 卡牌悬浮操作按钮 ====== */
        .card-hover-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: flex-start;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
        }

        .general-card:hover .card-hover-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        .card-btn-x {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: rgba(217, 74, 74, 0.85);
            color: #fff;
            font-size: 14px;
            line-height: 22px;
            text-align: center;
            cursor: pointer;
            margin: 4px 4px 0 0;
            transition: all 0.2s;
            border: none;
            font-weight: bold;
        }

        .card-btn-x:hover {
            background: #d94a4a;
            transform: scale(1.2);
        }

        .card-btn-lebusishu {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(212, 168, 67, 0.75);
            color: #fff;
            font-size: 10px;
            line-height: 28px;
            text-align: center;
            cursor: pointer;
            margin: 2px 4px 0 0;
            transition: all 0.2s;
            border: 2px solid rgba(212, 168, 67, 0.5);
        }

        .card-btn-lebusishu:hover {
            background: var(--gold);
            transform: scale(1.15);
        }

        .card-btn-camptop {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(74, 144, 217, 0.75);
            color: #fff;
            font-size: 12px;
            line-height: 28px;
            text-align: center;
            cursor: pointer;
            margin: 2px 4px 0 0;
            transition: all 0.2s;
            border: 2px solid rgba(74, 144, 217, 0.5);
        }

        .card-btn-camptop:hover {
            background: #4a90d9;
            transform: scale(1.15);
        }

        .card-btn-campbottom {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(217, 150, 74, 0.75);
            color: #fff;
            font-size: 12px;
            line-height: 28px;
            text-align: center;
            cursor: pointer;
            margin: 2px 4px 0 0;
            transition: all 0.2s;
            border: 2px solid rgba(217, 150, 74, 0.5);
        }

        .card-btn-campbottom:hover {
            background: #d9964a;
            transform: scale(1.15);
        }

        /* 横置按钮 */
        .card-btn-horizontal {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(155, 89, 182, 0.75);
            color: #fff;
            font-size: 14px;
            line-height: 28px;
            text-align: center;
            cursor: pointer;
            margin: 2px 4px 0 0;
            transition: all 0.2s;
            border: 2px solid rgba(155, 89, 182, 0.5);
        }

        .card-btn-horizontal:hover {
            background: #9b59b6;
            transform: scale(1.15);
        }

        /* 横置状态 */
        .general-card.horizontal {
            transform: rotate(90deg);
            transform-origin: center center;
        }

        .general-card.horizontal .general-card-inner {
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.6);
        }

        /* ====== 右侧功能栏 ====== */
        .right-sidebar {
            position: sticky;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .sidebar-panel {
            background: rgba(26, 26, 46, 0.85);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 18px;
            backdrop-filter: blur(10px);
        }

        .sidebar-panel-title {
            font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', cursive;
            font-size: 1.15em;
            color: var(--gold-light);
            text-align: center;
            margin-bottom: 14px;
            letter-spacing: 3px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(212, 168, 67, 0.2);
        }

        /* ====== 骰子面板 ====== */
        .dice-panel-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .dice-container {
            width: 70px;
            height: 70px;
            perspective: 600px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .dice-container:hover { transform: scale(1.08); }
        .dice-container:active { transform: scale(0.95); }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.3s ease-out;
        }

        .dice.rolling {
            animation: diceRoll 1.5s ease-out;
        }

        @keyframes diceRoll {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            20% { transform: rotateX(180deg) rotateY(90deg) rotateZ(45deg); }
            40% { transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg); }
            60% { transform: rotateX(540deg) rotateY(270deg) rotateZ(135deg); }
            80% { transform: rotateX(680deg) rotateY(350deg) rotateZ(175deg); }
            100% { transform: rotateX(720deg) rotateY(360deg) rotateZ(180deg); }
        }

        .dice-face {
            position: absolute;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #f8f4ec, #e8dcc8);
            border: 2px solid #b8a070;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            color: #5a3e1b;
            box-shadow: inset 0 0 12px rgba(180, 150, 100, 0.25);
        }

        .dice-face.front  { transform: translateZ(35px); }
        .dice-face.back   { transform: rotateY(180deg) translateZ(35px); }
        .dice-face.right  { transform: rotateY(90deg) translateZ(35px); }
        .dice-face.left   { transform: rotateY(-90deg) translateZ(35px); }
        .dice-face.top    { transform: rotateX(90deg) translateZ(35px); }
        .dice-face.bottom { transform: rotateX(-90deg) translateZ(35px); }

        .dice-config {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.88em;
            color: var(--text-secondary);
        }

        .dice-select {
            width: 65px;
            height: 34px;
            background: rgba(40, 40, 70, 0.9);
            color: var(--gold-light);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            transition: all 0.3s;
            text-align: center;
        }

        .dice-select:hover,
        .dice-select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 168, 67, 0.3);
        }

        .dice-result-box {
            width: 100%;
            text-align: center;
            padding: 12px 8px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 10px;
            border: 1px solid rgba(212, 168, 67, 0.15);
            min-height: 64px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .dice-result-label {
            font-size: 0.78em;
            color: var(--text-secondary);
            margin-bottom: 4px;
            letter-spacing: 2px;
        }

        .dice-result-value {
            font-size: 2.6em;
            font-weight: bold;
            color: var(--gold-light);
            text-shadow: 0 0 18px rgba(212, 168, 67, 0.5);
            line-height: 1;
            transition: all 0.3s;
        }

        .dice-result-value.popped {
            animation: resultPop 0.5s ease-out;
        }

        .dice-result-range {
            font-size: 0.72em;
            color: var(--text-secondary);
            margin-top: 4px;
            opacity: 0.7;
        }

        @keyframes resultPop {
            0% { transform: scale(0.4); opacity: 0; }
            50% { transform: scale(1.35); }
            100% { transform: scale(1); opacity: 1; }
        }

        .dice-hint {
            font-size: 0.75em;
            color: var(--text-secondary);
            opacity: 0.6;
            text-align: center;
        }

        /* ====== 版权信息面板 ====== */
        .credits-panel-body {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-size: 0.88em;
        }

        .credit-row {
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.5;
        }

        .credit-icon {
            flex-shrink: 0;
            width: 22px;
            text-align: center;
            font-size: 1.1em;
        }

        .credit-label {
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .credit-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .credit-value a {
            color: var(--gold-light);
            text-decoration: none;
            transition: color 0.2s;
            word-break: break-all;
        }

        .credit-value a:hover {
            color: var(--gold);
            text-decoration: underline;
        }

        .credit-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 168, 67, 0.2), transparent);
            margin: 2px 0;
        }

        .credit-qq-group {
            color: var(--gold-light);
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 乐不思蜀状态标记 */
        .lebusishu-indicator {
            position: absolute;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(212, 168, 67, 0.85);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            z-index: 5;
            white-space: nowrap;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid var(--gold);
            animation: lebuFloat 2s ease-in-out infinite;
        }

        @keyframes lebuFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-3px); }
        }

        /* 主帅标记 */
        .commander-crown {
            position: absolute;
            top: -6px; left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            z-index: 6;
            color: var(--gold-light);
            filter: drop-shadow(0 0 4px rgba(212,168,67,0.5));
        }

        /* ====== 休整区 ====== */
        .rest-area-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(100, 100, 150, 0.2);
        }

        .rest-area-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .rest-area-stack {
            position: relative;
            width: 80px;
            height: 110px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .rest-area-stack:hover {
            transform: translateY(-3px);
        }

        .rest-area-stack-empty {
            width: 80px;
            height: 110px;
            border: 1px dashed rgba(100, 100, 150, 0.3);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.7em;
            opacity: 0.4;
        }

        .rest-card-layer {
            position: absolute;
            width: 80px;
            height: 110px;
            border-radius: 6px;
            border: 2px solid;
            overflow: hidden;
        }

        .rest-area-count {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-left: 5px;
        }

        .rest-area-count .count-num {
            color: var(--gold-light);
            font-weight: bold;
        }

        /* ====== 弹窗 ====== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            animation: modalIn 0.2s ease-out;
        }

        @keyframes modalIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-title {
            font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', cursive;
            font-size: 1.3em;
            color: var(--gold-light);
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .modal-close {
            position: absolute;
            top: 10px; right: 15px;
            cursor: pointer;
            font-size: 1.3em;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .rest-modal-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .rest-modal-card {
            width: 100px;
            height: 140px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            border: 2px solid;
            cursor: default;
            transition: transform 0.2s;
        }

        .rest-modal-card:hover {
            transform: translateY(-5px);
        }

        .rest-card-btn-restore {
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(74, 217, 122, 0.85);
            color: #fff;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            z-index: 5;
            border: none;
            letter-spacing: 1px;
            transition: all 0.2s;
            opacity: 0;
        }

        .rest-modal-card:hover .rest-card-btn-restore {
            opacity: 1;
        }

        .rest-card-btn-restore:hover {
            background: #4ad97a;
            transform: translateX(-50%) scale(1.1);
        }

        /* ====== 技能弹窗 ====== */
        .skill-modal-image {
            width: 100%;
            height: auto;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: visible;
        }

        .skill-modal-image img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
        }

        .skill-modal-placeholder {
            font-family: 'Ma Shan Zheng', 'STKaiti', 'KaiTi', cursive;
            font-size: 3em;
            opacity: 0.5;
        }

        .skill-modal-desc {
            text-align: center;
            font-size: 0.95em;
            color: var(--text-primary);
            line-height: 1.6;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
        }

        /* ====== 撤回按钮 ====== */
        .btn-undo {
            background: linear-gradient(135deg, #5a4a2a, #8a7a5a);
            color: #fff;
            border: 1px solid rgba(212, 168, 67, 0.3);
            box-shadow: 0 4px 15px rgba(212, 168, 67, 0.1);
        }

        .btn-undo:hover:not(:disabled) {
            background: linear-gradient(135deg, #8a7a5a, #d4a843);
            box-shadow: 0 6px 20px rgba(212, 168, 67, 0.2);
            transform: translateY(-2px);
        }

        .btn-undo:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ====== draw count input ====== */
        .draw-count-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.9em;
            color: var(--text-secondary);
        }

        .draw-count-input {
            width: 40px;
            height: 32px;
            text-align: center;
            background: rgba(40, 40, 70, 0.9);
            color: var(--gold-light);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: bold;
            outline: none;
            -moz-appearance: textfield;
        }

        .draw-count-input::-webkit-inner-spin-button,
        .draw-count-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .draw-count-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(212, 168, 67, 0.3);
        }

        .draw-count-label {
            white-space: nowrap;
        }

        .force-player-wrapper {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .force-player-select {
            height: 36px;
            padding: 0 12px;
            background: rgba(26, 26, 46, 0.9);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .force-player-select:hover {
            border-color: var(--gold);
        }

        .force-player-select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 168, 67, 0.3);
        }
    </style>
</head>
<body>

<div class="bg-pattern"></div>
<canvas class="bg-particles" id="particleCanvas"></canvas>

<div class="toast-container" id="toastContainer"></div>

<div class="app-container">
<div class="main-content">
    <!-- 标题 -->
    <div class="app-header">
        <h1 class="app-title">三国杀TCG承天之弈 · 抽卡模拟</h1>
        <p class="app-subtitle">军营预组 · 对阵模拟</p>
    </div>

    <!-- 先手玩家 -->
    <div class="player-zone first-player" id="firstPlayerZone">
        <div class="player-header">
            <div class="player-info">
                <span class="player-badge">先手</span>
                <span class="deck-name" id="firstDeckName">未选择预组</span>
            </div>
            <div class="deck-select-wrapper" id="firstDeckSelectWrapper">
                <label>选择预组：</label>
                <select class="deck-select" id="firstDeckSelect">
                    <option value="">-- 请选择预组 --</option>
                </select>
            </div>
            <div class="player-stats" id="firstPlayerStats" style="display:none;">
                <div class="stat-item">
                    <span>军营：</span>
                    <span class="stat-value" id="firstCampCount">39</span>
                    <span>/ 39</span>
                    <div class="camp-indicator">
                        <div class="camp-bar">
                            <div class="camp-bar-fill" id="firstCampBar" style="width:100%"></div>
                        </div>
                    </div>
                </div>
                <div class="stat-item">
                    <span>已上阵：</span>
                    <span class="stat-value" id="firstFieldCount">0</span>
                </div>
            </div>
        </div>
        <div class="cards-area empty" id="firstFieldCards"></div>
        <!-- 休整区 -->
        <div class="rest-area-container" id="firstRestAreaContainer" style="display:none;">
            <span class="rest-area-label">休整区：</span>
            <div class="rest-area-stack" id="firstRestAreaStack" onclick="showRestAreaPopup('first')"></div>
            <span class="rest-area-count"><span class="count-num" id="firstRestCount">0</span>将</span>
        </div>
    </div>

    <!-- 战场分割线 -->
    <div class="battlefield-divider"><span>⚔ 战场 ⚔</span></div>

    <!-- 控制区 -->
    <div class="control-area">
        <button class="btn btn-start" id="btnStart" disabled>开启模拟</button>
        <button class="btn btn-next" id="btnNext" disabled>下一步</button>
        <div class="draw-count-wrapper" id="drawCountWrapper" style="display:none;">
            <span class="draw-count-label">抽</span>
            <input type="number" class="draw-count-input" id="drawCountInput" min="1" max="4" value="2">
            <span class="draw-count-label">张</span>
        </div>
        <div class="force-player-wrapper" id="forcePlayerWrapper" style="display:none;">
            <select class="force-player-select" id="forcePlayerSelect">
                <option value="">默认轮流</option>
                <option value="first">先手抽卡</option>
                <option value="second">后手抽卡</option>
            </select>
        </div>
        <button class="btn btn-undo" id="btnUndo" disabled>撤回上一次抽卡</button>
        <button class="btn btn-reset" id="btnReset" disabled>重置</button>
    </div>

    <!-- 状态栏 -->
    <div class="status-bar" id="statusBar">
        <span>请为双方玩家选择预组后开始模拟</span>
    </div>

    <!-- 战斗日志 -->
    <div class="battle-log" id="battleLog" style="display:none;">
        <div class="log-title">📜 战报</div>
        <div id="logContent"></div>
    </div>

    <!-- 后手玩家 -->
    <div class="player-zone second-player" id="secondPlayerZone">
        <div class="player-header">
            <div class="player-info">
                <span class="player-badge">后手</span>
                <span class="deck-name" id="secondDeckName">未选择预组</span>
            </div>
            <div class="deck-select-wrapper" id="secondDeckSelectWrapper">

<script>
    // ====== 全局状态 ======
    let simulationStarted = false;
    let simulationFinished = false;
    let decks = [];
    let firstPlayerTotal = 39;
    let secondPlayerTotal = 39;
    // 保存当前对局完整状态（用于前端渲染）
    let currentGameState = null;
    let canUndo = false;

    // ====== 初始化 ======
    document.addEventListener('DOMContentLoaded', function() {
        loadDecks();
        initParticles();
        bindEvents();
    });

    // ====== 加载预组列表 ======
    function loadDecks() {
        fetch('/api/decks')
            .then(res => res.json())
            .then(data => {
                decks = data;
                const firstSelect = document.getElementById('firstDeckSelect');
                const secondSelect = document.getElementById('secondDeckSelect');

                data.forEach(deck => {
                    const opt1 = createDeckOption(deck);
                    const opt2 = createDeckOption(deck);
                    firstSelect.appendChild(opt1);
                    secondSelect.appendChild(opt2);
                });
            })
            .catch(err => {
                showToast('加载预组数据失败，请确认服务已启动', 'error');
            });
    }

    function createDeckOption(deck) {
        const opt = document.createElement('option');
        opt.value = deck.id;
        const factionMap = { '魏': 'wei', '蜀': 'shu', '吴': 'wu', '群': 'qun' };
        opt.textContent = deck.name + ' (' + deck.totalCount + '将)';
        return opt;
    }

    // ====== 绑定事件 ======
    function bindEvents() {
        const firstSelect = document.getElementById('firstDeckSelect');
        const secondSelect = document.getElementById('secondDeckSelect');
        const btnStart = document.getElementById('btnStart');
        const btnNext = document.getElementById('btnNext');
        const btnReset = document.getElementById('btnReset');

        firstSelect.addEventListener('change', onDeckSelectChange);
        secondSelect.addEventListener('change', onDeckSelectChange);

        btnStart.addEventListener('click', startSimulation);
        btnNext.addEventListener('click', nextStep);
        btnReset.addEventListener('click', resetSimulation);

        document.getElementById('btnUndo').addEventListener('click', undoLastStep);

        // draw count input: clamp 1-4 on change
        document.getElementById('drawCountInput').addEventListener('change', function() {
            let v = parseInt(this.value);
            if (isNaN(v) || v < 1) v = 1;
            if (v > 4) v = 4;
            this.value = v;
        });
    }

    function onDeckSelectChange() {
        const firstVal = document.getElementById('firstDeckSelect').value;
        const secondVal = document.getElementById('secondDeckSelect').value;

        const firstDeck = decks.find(d => d.id === firstVal);
        const secondDeck = decks.find(d => d.id === secondVal);
        document.getElementById('firstDeckName').textContent = firstDeck ? firstDeck.name : '未选择预组';
        document.getElementById('secondDeckName').textContent = secondDeck ? secondDeck.name : '未选择预组';

        document.getElementById('btnStart').disabled = !(firstVal && secondVal);
    }

    // ====== 开始模拟 ======
    function startSimulation() {
        const firstDeckId = document.getElementById('firstDeckSelect').value;
        const secondDeckId = document.getElementById('secondDeckSelect').value;

        if (!firstDeckId || !secondDeckId) {
            showToast('请为双方玩家选择预组', 'warning');
            return;
        }

        fetch('/api/simulation/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                firstPlayerDeckId: firstDeckId,
                secondPlayerDeckId: secondDeckId
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                showToast(data.error, 'error');
                return;
            }
        
            simulationStarted = true;
            simulationFinished = false;
            canUndo = false;
        
            firstPlayerTotal = data.firstPlayerCampSize;
            secondPlayerTotal = data.secondPlayerCampSize;
        
            // 更新按钮状态
            document.getElementById('btnStart').disabled = true;
            document.getElementById('btnNext').disabled = false;
            document.getElementById('btnUndo').disabled = true;
            document.getElementById('btnReset').disabled = false;
            document.getElementById('firstDeckSelect').disabled = true;
            document.getElementById('secondDeckSelect').disabled = true;
            // show draw count input, default to 1 for first turn
            document.getElementById('drawCountWrapper').style.display = 'flex';
            document.getElementById('drawCountInput').value = 1;
            // show force player select
            document.getElementById('forcePlayerWrapper').style.display = 'flex';
            document.getElementById('forcePlayerSelect').value = '';
        
            // 显示统计
            document.getElementById('firstPlayerStats').style.display = 'flex';
            document.getElementById('secondPlayerStats').style.display = 'flex';
            updateCampDisplay('first', data.firstPlayerCampSize, data.firstPlayerField ? data.firstPlayerField.length : 0);
            updateCampDisplay('second', data.secondPlayerCampSize, data.secondPlayerField ? data.secondPlayerField.length : 0);
        
            // 渲染初始战场（包含主帅卡）
            renderFullField('first', data.firstPlayerField || []);
            renderFullField('second', data.secondPlayerField || []);
        
            // 渲染休整区
            updateRestAreaDisplay('first', data.firstPlayerRestArea || [], data.firstPlayerLeBuSiShu || []);
            updateRestAreaDisplay('second', data.secondPlayerRestArea || [], data.secondPlayerLeBuSiShu || []);
        
            updateStatusBar(1, true, true);
            setActivePlayer('first');
        
            // 显示战斗日志
            document.getElementById('battleLog').style.display = 'block';
            document.getElementById('logContent').innerHTML = '';
        
            showToast('模拟开始！先手首回合仅上阵1名武将', 'success');
        })
        .catch(err => {
            showToast('启动模拟失败: ' + err.message, 'error');
        });
    }

    // ====== 下一步 ======
    function nextStep() {
        if (!simulationStarted || simulationFinished) return;
    
        document.getElementById('btnNext').disabled = true;
    
        // 获取forcePlayer参数
        const forcePlayer = document.getElementById('forcePlayerSelect').value;
    
        fetch('/api/simulation/next', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                drawCount: parseInt(document.getElementById('drawCountInput').value) || 2,
                forcePlayer: forcePlayer || null
            })
        })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                showToast(data.error, 'error');
                document.getElementById('btnNext').disabled = false;
                return;
            }
    
            const player = data.player;
            const drawnCards = data.drawnCards || [];
    
            // >5校验：如果message包含“弃置至5或5以下”，阻止操作
            if (data.message && data.message.indexOf('弃置至5或5以下') !== -1) {
                showToast(data.message, 'warning');
                document.getElementById('btnNext').disabled = false;
                document.getElementById('btnUndo').disabled = true;
                return;
            }
    
            triggerDrawEffect();
    
            setTimeout(() => {
                renderDrawnCards(player, drawnCards);
    
                addBattleLog(data.turn, player, 'draw', drawnCards, { finished: data.finished });
    
                updateCampDisplay('first', data.firstPlayerCampRemaining, data.firstPlayerField.length);
                updateCampDisplay('second', data.secondPlayerCampRemaining, data.secondPlayerField.length);
    
                // 更新休整区和乐不思蜀
                updateRestAreaDisplay('first', data.firstPlayerRestArea || [], data.firstPlayerLeBuSiShu || []);
                updateRestAreaDisplay('second', data.secondPlayerRestArea || [], data.secondPlayerLeBuSiShu || []);
    
                // 更新撤回按钮
                canUndo = data.canUndo || false;
                document.getElementById('btnUndo').disabled = !canUndo;
    
                const nextIsFirst = player === 'second';
                updateStatusBar(data.turn, nextIsFirst, false);
    
                setActivePlayer(nextIsFirst ? 'first' : 'second');
    
                if (data.finished) {
                    simulationFinished = true;
                    document.getElementById('btnNext').disabled = true;
                    document.getElementById('btnUndo').disabled = true;
                    document.getElementById('drawCountWrapper').style.display = 'none';
                    document.getElementById('forcePlayerWrapper').style.display = 'none';
                    showToast(data.message, 'warning');
                } else {
                    document.getElementById('btnNext').disabled = false;
                    // reset draw count to 2 after each draw
                    document.getElementById('drawCountInput').value = 2;
                    // reset force player to default
                    document.getElementById('forcePlayerSelect').value = '';
                    const playerLabel = player === 'first' ? '先手' : '后手';
                    const cardNames = drawnCards.map(c => c.name).join('、');
                    showToast(playerLabel + '上阵：' + cardNames, 'info');
                }
            }, 300);
        })
        .catch(err => {
            showToast('操作失败: ' + err.message, 'error');
            document.getElementById('btnNext').disabled = false;
        });
    }

    // ====== 重置 ======
    function resetSimulation() {
        fetch('/api/simulation/reset', {
            method: 'POST'
        })
        .then(res => res.json())
        .then(data => {
            simulationStarted = false;
            simulationFinished = false;
            canUndo = false;
            currentGameState = null;
    
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnNext').disabled = true;
            document.getElementById('btnUndo').disabled = true;
            document.getElementById('btnReset').disabled = true;
            document.getElementById('firstDeckSelect').disabled = false;
            document.getElementById('secondDeckSelect').disabled = false;
            document.getElementById('drawCountWrapper').style.display = 'none';
            document.getElementById('forcePlayerWrapper').style.display = 'none';
    
            document.getElementById('firstFieldCards').innerHTML = '';
            document.getElementById('secondFieldCards').innerHTML = '';
            document.getElementById('firstFieldCards').classList.add('empty');
            document.getElementById('secondFieldCards').classList.add('empty');
    
            document.getElementById('firstPlayerStats').style.display = 'none';
            document.getElementById('secondPlayerStats').style.display = 'none';
            document.getElementById('firstRestAreaContainer').style.display = 'none';
            document.getElementById('secondRestAreaContainer').style.display = 'none';
    
            document.getElementById('statusBar').innerHTML = '<span>请为双方玩家选择预组后开始模拟</span>';
    
            document.getElementById('firstPlayerZone').classList.remove('active');
            document.getElementById('secondPlayerZone').classList.remove('active');
    
            document.getElementById('battleLog').style.display = 'none';
    
            // 关闭所有弹窗
            const modal = document.getElementById('modalOverlay');
            if (modal) modal.remove();
    
            showToast('模拟已重置', 'info');
        })
        .catch(err => {
            showToast('重置失败: ' + err.message, 'error');
        });
    }

    // ====== 渲染完整战场 ======
    function renderFullField(player, fieldCards) {
        const containerId = player === 'first' ? 'firstFieldCards' : 'secondFieldCards';
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (fieldCards.length === 0) {
            container.classList.add('empty');
        } else {
            container.classList.remove('empty');
            fieldCards.forEach((card, i) => {
                const cardEl = createCardElement(card, player, i);
                cardEl.classList.remove('new-draw'); // 已有卡不播放高亮动画
                container.appendChild(cardEl);
            });
        }
    }

    // ====== 渲染武将卡 ======
    function renderDrawnCards(player, cards) {
        const containerId = player === 'first' ? 'firstFieldCards' : 'secondFieldCards';
        const container = document.getElementById(containerId);
        container.classList.remove('empty');

        cards.forEach((card, index) => {
            const cardEl = createCardElement(card, player, index);
            container.appendChild(cardEl);
        });
    }

    function createCardElement(cardData, player, delayIndex) {
        const factionMap = { '魏': 'wei', '蜀': 'shu', '吴': 'wu', '群': 'qun' };
        const factionClass = factionMap[cardData.faction] || 'qun';
    
        const cardEl = document.createElement('div');
        cardEl.className = 'general-card faction-' + factionClass + ' new-draw';
        cardEl.style.animationDelay = (delayIndex * 0.15) + 's';
        cardEl.dataset.cardId = cardData.id;
        cardEl.dataset.player = player;
    
        const inner = document.createElement('div');
        inner.className = 'general-card-inner';
    
        // 装饰边框
        const borderDecor = document.createElement('div');
        borderDecor.className = 'card-border-decor';
    
        // 图片区域
        const imageArea = document.createElement('div');
        imageArea.className = 'card-image-area';
    
        if (cardData.imagePath) {
            const img = document.createElement('img');
            img.src = cardData.imagePath;
            img.alt = cardData.name;
            img.onerror = function() {
                this.style.display = 'none';
                const placeholder = document.createElement('span');
                placeholder.className = 'card-image-placeholder';
                placeholder.textContent = cardData.name.charAt(0);
                imageArea.appendChild(placeholder);
            };
            imageArea.appendChild(img);
        } else {
            const placeholder = document.createElement('span');
            placeholder.className = 'card-image-placeholder';
            placeholder.textContent = cardData.name.charAt(0);
            imageArea.appendChild(placeholder);
        }
    
        // 名称区域
        const nameArea = document.createElement('div');
        nameArea.className = 'card-name-area';
    
        const nameEl = document.createElement('div');
        nameEl.className = 'card-name';
        nameEl.textContent = cardData.name;
    
        const factionTag = document.createElement('span');
        factionTag.className = 'card-faction-tag';
        factionTag.textContent = cardData.faction;
    
        nameArea.appendChild(nameEl);
        nameArea.appendChild(factionTag);
    
        inner.appendChild(borderDecor);
        inner.appendChild(imageArea);
        inner.appendChild(nameArea);
    
        // 【新增】主帅标记
        if (cardData.isCommander) {
            const crown = document.createElement('div');
            crown.className = 'commander-crown';
            crown.textContent = '♛';
            cardEl.appendChild(crown);
        }
    
        // 【新增】悬浮操作按钮覆盖层
        const hoverOverlay = document.createElement('div');
        hoverOverlay.className = 'card-hover-overlay';
    
        const btnX = document.createElement('button');
        btnX.className = 'card-btn-x';
        btnX.textContent = '✕';
        btnX.title = '置入休整区';
        btnX.onclick = function(e) {
            e.stopPropagation();
            moveToRestArea(player, cardData.id);
        };
    
        const btnLebu = document.createElement('button');
        btnLebu.className = 'card-btn-lebusishu';
        btnLebu.textContent = '乐';
        btnLebu.title = '乐不思蜀';
        btnLebu.onclick = function(e) {
            e.stopPropagation();
            toggleLeBuSiShu(player, cardData.id);
        };

        const btnCampTop = document.createElement('button');
        btnCampTop.className = 'card-btn-camptop';
        btnCampTop.textContent = '\u2191';
        btnCampTop.title = '\u653E\u56DE\u519B\u8425\u9876';
        btnCampTop.onclick = function(e) {
            e.stopPropagation();
            moveToCampTop(player, cardData.id);
        };

        const btnCampBottom = document.createElement('button');
        btnCampBottom.className = 'card-btn-campbottom';
        btnCampBottom.textContent = '\u2193';
        btnCampBottom.title = '\u653E\u56DE\u519B\u8425\u5E95';
        btnCampBottom.onclick = function(e) {
            e.stopPropagation();
            moveToCampBottom(player, cardData.id);
        };

        const btnHorizontal = document.createElement('button');
        btnHorizontal.className = 'card-btn-horizontal';
        btnHorizontal.textContent = '\u21BB'; // 旋转图标
        btnHorizontal.title = '\u6A2A\u7F6E';
        btnHorizontal.onclick = function(e) {
            e.stopPropagation();
            toggleHorizontal(cardEl);
        };

        hoverOverlay.appendChild(btnX);
        hoverOverlay.appendChild(btnLebu);
        hoverOverlay.appendChild(btnCampTop);
        hoverOverlay.appendChild(btnCampBottom);
        hoverOverlay.appendChild(btnHorizontal);
    
        cardEl.appendChild(inner);
        cardEl.appendChild(hoverOverlay);
    
        // 【新增】点击武将卡显示技能弹窗
        cardEl.addEventListener('click', function(e) {
            // 如果点击的是操作按钮，不触发技能弹窗
            if (e.target.classList.contains('card-btn-x') || 
                e.target.classList.contains('card-btn-lebusishu') || 
                e.target.classList.contains('card-btn-camptop') || 
                e.target.classList.contains('card-btn-campbottom') ||
                e.target.classList.contains('card-btn-horizontal')) return;
            showSkillPopup(cardData);
        });
    
        // 移除高亮动画
        setTimeout(() => {
            cardEl.classList.remove('new-draw');
        }, 2000);
    
        return cardEl;
    }

    // ====== 战斗日志 ======
    function addBattleLog(turn, player, action, details, extra) {
        const logContent = document.getElementById('logContent');
        const entry = document.createElement('div');
        entry.className = 'log-entry';

        const playerLabel = player === 'first' ? '先手' : '后手';
        const playerClass = player === 'first' ? 'log-player-first' : 'log-player-second';

        const factionMap = { '魏': 'log-faction-wei', '蜀': 'log-faction-shu', '吴': 'log-faction-wu', '群': 'log-faction-qun' };

        let actionText = '';
        if (action === 'draw') {
            // 上阵
            let cardsHtml = details.map(c => {
                const factionClass = factionMap[c.faction] || '';
                return '<span class="' + factionClass + '">' + c.name + '</span>';
            }).join('、');
            actionText = '上阵：<span class="log-cards">' + cardsHtml + '</span>';
            if (extra && extra.finished) {
                actionText += ' <span style="color: #d94a4a;">— 武将不足，模拟结束</span>';
            }
        } else if (action === 'undo') {
            actionText = '<span style="color: #8888cc;">撤回上一次抽卡</span>';
        } else if (action === 'campTop') {
            const factionClass = factionMap[details.faction] || '';
            actionText = '放回军营顶：<span class="' + factionClass + '">' + details.name + '</span>';
        } else if (action === 'campBottom') {
            const factionClass = factionMap[details.faction] || '';
            actionText = '放回军营底：<span class="' + factionClass + '">' + details.name + '</span>';
        } else if (action === 'lebusishu') {
            const factionClass = factionMap[details.faction] || '';
            actionText = (details.added ? '贴上' : '移除') + '乐不思蜀：<span class="' + factionClass + '">' + details.name + '</span>';
        } else if (action === 'rest') {
            const factionClass = factionMap[details.faction] || '';
            actionText = '置入休整区：<span class="' + factionClass + '">' + details.name + '</span>';
        } else if (action === 'restore') {
            const factionClass = factionMap[details.faction] || '';
            actionText = '恢复至战场：<span class="' + factionClass + '">' + details.name + '</span>';
        }

        // 不显示回合数，只显示玩家和操作
        entry.innerHTML = '<span class="' + playerClass + '">' + playerLabel + '</span>' +
            ' ' + actionText;

        logContent.appendChild(entry);

        // 自动滚动到底部
        const battleLog = document.getElementById('battleLog');
        battleLog.scrollTop = battleLog.scrollHeight;
    }

    // ====== 更新军营显示 ======
    function updateCampDisplay(player, campRemaining, fieldCount) {
        const total = player === 'first' ? firstPlayerTotal : secondPlayerTotal;
        document.getElementById(player + 'CampCount').textContent = campRemaining;
        document.getElementById(player + 'FieldCount').textContent = fieldCount;

        const percent = total > 0 ? (campRemaining / total * 100) : 0;
        document.getElementById(player + 'CampBar').style.width = percent + '%';
    }

    // ====== 更新状态栏 ======
    function updateStatusBar(turn, nextIsFirst, isFirstTurn) {
        const statusBar = document.getElementById('statusBar');
        let html = '<span class="turn-info">当前状态</span>';

        if (isFirstTurn && nextIsFirst) {
            html += '<span class="next-action first">先手首回合 · 上阵1名武将</span>';
        } else if (nextIsFirst) {
            html += '<span class="next-action first">先手行动 · 上阵2名武将</span>';
        } else {
            html += '<span class="next-action second">后手行动 · 上阵2名武将</span>';
        }

        statusBar.innerHTML = html;
    }

    // ====== 设置活跃玩家高亮 ======
    function setActivePlayer(player) {
        document.getElementById('firstPlayerZone').classList.toggle('active', player === 'first');
        document.getElementById('secondPlayerZone').classList.toggle('active', player === 'second');
    }

    // ====== 抽卡特效 ======
    function triggerDrawEffect() {
        const effect = document.createElement('div');
        effect.className = 'draw-effect';
        effect.innerHTML = '<div class="draw-flash"></div>';
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 1000);
    }

    // ====== Toast消息 ======
    function showToast(message, type) {
        type = type || 'info';
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ====== 通用API调用（操作后同步刷新完整状态） ======
    function callCardApi(url, body) {
        return fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        })
        .then(res => res.json());
    }

    // ====== 撤回上一步 ======
    function undoLastStep() {
        if (!canUndo) {
            showToast('无法撤回：没有可撤回的操作', 'warning');
            return;
        }

        document.getElementById('btnUndo').disabled = true;
        document.getElementById('btnNext').disabled = true;

        fetch('/api/simulation/undo', { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                showToast(data.error, 'error');
                document.getElementById('btnUndo').disabled = canUndo;
                document.getElementById('btnNext').disabled = false;
                return;
            }

            canUndo = false;
            document.getElementById('btnUndo').disabled = true;
            document.getElementById('btnNext').disabled = false;

            // 同步渲染完整状态
            syncFullState(data);

            // 记录战报
            addBattleLog(data.turn, data.player, 'undo', null, null);

            showToast(data.message, 'info');
        })
        .catch(err => {
            showToast('撤回失败: ' + err.message, 'error');
        });
    }

    // ====== 置入休整区 ======
    function moveToRestArea(player, cardId) {
        const cardEl = document.querySelector('.general-card[data-card-id="' + cardId + '"]');
        const cardName = cardEl ? cardEl.querySelector('.card-name').textContent : '';
        const cardFaction = cardEl ? cardEl.querySelector('.card-faction-tag').textContent : '';
        // 获取卡牌图片路径（用于弹窗显示）
        const cardImgEl = cardEl ? cardEl.querySelector('.card-image-area img') : null;
        const cardImagePath = cardImgEl ? cardImgEl.src : null;
            
        callCardApi('/api/simulation/card/rest', { player: player, cardId: cardId })
        .then(data => {
            if (data.error) {
                showToast(data.error, 'error');
                return;
            }
            syncFullState(data);
            addBattleLog(data.currentTurn, player, 'rest', { name: cardName, faction: cardFaction }, null);
            showToast('武将已置入休整区', 'info');
                
            // 进入休整区后立刻触发查看图片弹窗
            showRestCardPopup(cardName, cardFaction, cardImagePath);
        })
        .catch(err => showToast('操作失败: ' + err.message, 'error'));
    }
    
    // ====== 显示休整区卡牌图片弹窗 ======
    function showRestCardPopup(cardName, cardFaction, cardImagePath) {
        const factionMap = { '魏': 'wei', '蜀': 'shu', '吴': 'wu', '群': 'qun' };
        const fc = factionMap[cardFaction] || 'qun';
    
        let imageHtml = '';
        if (cardImagePath) {
            imageHtml = '<img src="' + cardImagePath + '" alt="' + cardName + '" style="width:100%;height:auto;max-height:400px;object-fit:contain;">';
        } else {
            imageHtml = '<span class="skill-modal-placeholder" style="color:' + (fc === 'wei' ? 'var(--wei-color)' : fc === 'shu' ? 'var(--shu-color)' : fc === 'wu' ? 'var(--wu-color)' : 'var(--qun-color)') + '">' + cardName.charAt(0) + '</span>';
        }
    
        const content = '<div class="skill-modal-image faction-' + fc + '">' + imageHtml + '</div>' +
            '<div style="text-align:center;font-family:\'Ma Shan Zheng\',cursive;font-size:1.2em;color:var(--gold-light);">' + cardName + '</div>' +
            '<div style="text-align:center;margin-top:8px;font-size:0.9em;color:var(--text-secondary);">武将已置入休整区</div>';
    
        showModal(cardName + ' · 休整区', content);
    }

    function moveToCampTop(player, cardId) {
        const cardEl = document.querySelector('.general-card[data-card-id="' + cardId + '"]');

        callCardApi('/api/simulation/card/camp-top', { player: player, cardId: cardId })
        .then(data => {
            if (data.error) {
                showToast(data.error, 'error');
                return;
            }
            syncFullState(data);
            addBattleLog(data.currentTurn, player, 'campTop', { name: cardName, faction: cardFaction }, null);
            showToast('武将已放回军营顶部', 'info');
        })
        .catch(err => showToast('操作失败: ' + err.message, 'error'));

    // ====== 放回军营底部 ======
    function moveToCampBottom(player, cardId) {
        const cardEl = document.querySelector('.general-card[data-card-id="' + cardId + '"]');
        const cardName = cardEl ? cardEl.querySelector('.card-name').textContent : '';
        const cardFaction = cardEl ? cardEl.querySelector('.card-faction-tag').textContent : '';
        
        callCardApi('/api/simulation/card/camp-bottom', { player: player, cardId: cardId })

                showToast(data.error, 'error');

            syncFullState(data);

    // ====== 从休整区恢复至战场 ======
    function restoreFromRestArea(player, cardId) {
        const restArea = player === 'first' ? (currentGameState ? currentGameState.firstPlayerRestArea : []) : (currentGameState ? currentGameState.secondPlayerRestArea : []);
        const card = restArea.find(c => c.id === cardId);
        const cardName = card ? card.name : '';
        const cardFaction = card ? card.faction : '';
        
        callCardApi('/api/simulation/card/restore', { player: player, cardId: cardId })
        .then(data => {
            if (data.error) {
                showToast(data.error, 'error');
                return;
            }
            syncFullState(data);
            addBattleLog(data.currentTurn, player, 'restore', { name: cardName, faction: cardFaction }, null);
            showToast('武将已恢复至战场', 'success');
        })
        .catch(err => showToast('操作失败: ' + err.message, 'error'));

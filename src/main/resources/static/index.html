    // ====== 切换乐不思蜀 ======
    function toggleLeBuSiShu(player, cardId) {
        const cardEl = document.querySelector('.general-card[data-card-id="' + cardId + '"]');
        const cardName = cardEl ? cardEl.querySelector('.card-name').textContent : '';
        const cardFaction = cardEl ? cardEl.querySelector('.card-faction-tag').textContent : '';
        const hasLebu = cardEl ? cardEl.querySelector('.lebusishu-indicator') !== null : false;
        
        callCardApi('/api/simulation/card/lebusishu', { player: player, cardId: cardId })
        .then(data => {
            if (data.error) {
                showToast(data.error, 'error');
                return;
            }
            syncFullState(data);
            // 切换前没有乐 -> 现在加了乐
            const added = !hasLebu;
            addBattleLog(data.currentTurn, player, 'lebusishu', { name: cardName, faction: cardFaction, added: added }, null);
            showToast('乐不思蜀状态已切换', 'info');
        })
        .catch(err => showToast('操作失败: ' + err.message, 'error'));
    }

    // ====== 同步渲染完整状态 ======
    function syncFullState(stateData) {
        // 渲染战场
        renderFullField('first', stateData.firstPlayerField || []);
        renderFullField('second', stateData.secondPlayerField || []);

        // 添加乐不思蜀标记
        applyLeBuSiShuIndicators('first', stateData.firstPlayerLeBuSiShu || []);
        applyLeBuSiShuIndicators('second', stateData.secondPlayerLeBuSiShu || []);

        // 渲染休整区
        updateRestAreaDisplay('first', stateData.firstPlayerRestArea || [], stateData.firstPlayerLeBuSiShu || []);
        updateRestAreaDisplay('second', stateData.secondPlayerRestArea || [], stateData.secondPlayerLeBuSiShu || []);

        // 更新统计
        updateCampDisplay('first', stateData.firstPlayerCampRemaining, stateData.firstPlayerField.length);
        updateCampDisplay('second', stateData.secondPlayerCampRemaining, stateData.secondPlayerField.length);

        // 更新状态栏
        updateStatusBar(stateData.currentTurn || 1, stateData.nextIsFirstPlayer, stateData.isFirstTurn);
        setActivePlayer(stateData.nextIsFirstPlayer ? 'first' : 'second');

        // 更新撤回状态
        canUndo = stateData.canUndo || false;
        document.getElementById('btnUndo').disabled = !canUndo;
    }

    // ====== 应用乐不思蜀标记到战场卡牌 ======
    function applyLeBuSiShuIndicators(player, leBuSiShuIds) {
        const containerId = player === 'first' ? 'firstFieldCards' : 'secondFieldCards';
        const container = document.getElementById(containerId);
        const cards = container.querySelectorAll('.general-card');

        cards.forEach(cardEl => {
            // 先移除旧标记
            const oldIndicator = cardEl.querySelector('.lebusishu-indicator');
            if (oldIndicator) oldIndicator.remove();

            const cardId = cardEl.dataset.cardId;
            if (leBuSiShuIds.indexOf(cardId) !== -1) {
                const indicator = document.createElement('div');
                indicator.className = 'lebusishu-indicator';
                indicator.textContent = '乐不思蜀';
                cardEl.appendChild(indicator);
            }
        });
    }

    // ====== 更新休整区显示 ======
    function updateRestAreaDisplay(player, restCards, leBuSiShuIds) {
        const containerId = player + 'RestAreaContainer';
        const stackId = player + 'RestAreaStack';
        const countId = player + 'RestCount';

        const container = document.getElementById(containerId);
        const stack = document.getElementById(stackId);

        if (restCards.length === 0) {
            container.style.display = 'none';
            stack.innerHTML = '';
            return;
        }

        container.style.display = 'flex';
        document.getElementById(countId).textContent = restCards.length;

        // 渲染叠卡效果：只显示最上方（最后一个）的卡牌全貌，其他用薄层表示
        stack.innerHTML = '';
        const topCard = restCards[restCards.length - 1];
        const factionMap = { '魏': 'wei', '蜀': 'shu', '吴': 'wu', '群': 'qun' };
        const fc = factionMap[topCard.faction] || 'qun';

        // 底层薄层
        const layers = Math.min(restCards.length - 1, 5);
        for (let i = 0; i < layers; i++) {
            const layer = document.createElement('div');
            layer.className = 'rest-card-layer faction-' + fc;
            layer.style.bottom = (i * 4) + 'px';
            layer.style.left = (i * 2) + 'px';
            layer.style.opacity = '0.3';
            layer.style.zIndex = i;
            // 颜色
            if (fc === 'wei') layer.style.borderColor = 'var(--wei-color)';
            else if (fc === 'shu') layer.style.borderColor = 'var(--shu-color)';
            else if (fc === 'wu') layer.style.borderColor = 'var(--wu-color)';
            else layer.style.borderColor = 'var(--qun-color)';
            stack.appendChild(layer);
        }

        // 最上方完整卡牌
        const topLayer = document.createElement('div');
        topLayer.className = 'rest-card-layer faction-' + fc;
        topLayer.style.bottom = (layers * 4) + 'px';
        topLayer.style.left = (layers * 2) + 'px';
        topLayer.style.zIndex = layers;
        topLayer.style.opacity = '1';
        if (fc === 'wei') topLayer.style.borderColor = 'var(--wei-color)';
        else if (fc === 'shu') topLayer.style.borderColor = 'var(--shu-color)';
        else if (fc === 'wu') topLayer.style.borderColor = 'var(--wu-color)';
        else topLayer.style.borderColor = 'var(--qun-color)';

        // 卡内容
        const imgArea = document.createElement('div');
        imgArea.style.cssText = 'width:100%;height:70px;display:flex;align-items:center;justify-content:center;overflow:hidden;';
        if (topCard.imagePath) {
            const img = document.createElement('img');
            img.src = topCard.imagePath;
            img.alt = topCard.name;
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
            img.onerror = function() {
                this.style.display = 'none';
                const ph = document.createElement('span');
                ph.className = 'card-image-placeholder';
                ph.textContent = topCard.name.charAt(0);
                imgArea.appendChild(ph);
            };
            imgArea.appendChild(img);
        } else {
            const ph = document.createElement('span');
            ph.className = 'card-image-placeholder';
            ph.textContent = topCard.name.charAt(0);
            imgArea.appendChild(ph);
        }

        const nameArea = document.createElement('div');
        nameArea.className = 'card-name-area';
        const nameDiv = document.createElement('div');
        nameDiv.className = 'card-name';
        nameDiv.textContent = topCard.name;
        nameArea.appendChild(nameDiv);

        topLayer.appendChild(imgArea);
        topLayer.appendChild(nameArea);
        stack.appendChild(topLayer);

        // 设置stack高度
        stack.style.height = (110 + layers * 4) + 'px';
    }

    // ====== 休整区弹窗 ======
    function showRestAreaPopup(player) {
        fetch('/api/simulation/state')
        .then(res => res.json())
        .then(stateData => {
            const restCardsData = player === 'first' ? (stateData.firstPlayerRestArea || []) : (stateData.secondPlayerRestArea || []);

            if (restCardsData.length === 0) {
                showToast('休整区暂无武将', 'info');
                return;
            }
            
            const factionMap = { '魏': 'wei', '蜀': 'shu', '吴': 'wu', '群': 'qun' };
            
            let cardsHtml = '';
            restCardsData.forEach(card => {
                const fc = factionMap[card.faction] || 'qun';
                const bgColor = fc === 'wei' ? '#1a2a4a' : fc === 'shu' ? '#3a1a1a' : fc === 'wu' ? '#1a3a1a' : '#2a1a3a';
                const borderColor = fc === 'wei' ? 'var(--wei-color)' : fc === 'shu' ? 'var(--shu-color)' : fc === 'wu' ? 'var(--wu-color)' : 'var(--qun-color)';

                let imgContent = '';
                if (card.imagePath) {
                    imgContent = '<img src="' + card.imagePath + '" alt="' + card.name + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\'<span class="card-image-placeholder" style="font-size:2em">' + card.name.charAt(0) + '</span>\'">';
                } else {
                    imgContent = '<span class="card-image-placeholder" style="font-size:2em">' + card.name.charAt(0) + '</span>';
                }

                cardsHtml += '<div class="rest-modal-card" style="border-color:' + borderColor + ';background:' + bgColor + ';" data-card-id="' + card.id + '">' +
                    '<div style="width:100%;height:70px;display:flex;align-items:center;justify-content:center;overflow:hidden;">' + imgContent + '</div>' +
                    '<div class="card-name-area"><div class="card-name">' + card.name + '</div></div>' +
                    '<button class="rest-card-btn-restore" onclick="restoreFromRestAreaPopup(\'' + player + '\', \'' + card.id + '\')">恢复至战场</button>' +
                    '</div>';
            });

            const playerName = player === 'first' ? '先手' : '后手';
            showModal(playerName + '休整区', cardsHtml);
        })
        .catch(err => showToast('获取状态失败: ' + err.message, 'error'));
    }

    function restoreFromRestAreaPopup(player, cardId) {
        closeModal();
        restoreFromRestArea(player, cardId);
    }

    // ====== 技能弹窗 ======
    function showSkillPopup(cardData) {
        // 从API获取技能描述
        fetch('/api/card/skill?name=' + encodeURIComponent(cardData.name))

                imageHtml = '<img src="' + cardData.imagePath + '" alt="' + cardData.name + '" style="width:100%;height:100%;object-fit:cover;">';
            } else {
                imageHtml = '<span class="skill-modal-placeholder" style="color:' + (fc === 'wei' ? 'var(--wei-color)' : fc === 'shu' ? 'var(--shu-color)' : fc === 'wu' ? 'var(--wu-color)' : 'var(--qun-color)') + '">' + cardData.name.charAt(0) + '</span>';

    // ====== 弹窗工具 ======
    function showModal(title, contentHtml) {
        // 移除旧弹窗
        const oldModal = document.getElementById('modalOverlay');
        if (oldModal) oldModal.remove();

        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.id = 'modalOverlay';
        overlay.onclick = function(e) {
            if (e.target === overlay) closeModal();
        };

        const content = document.createElement('div');
        content.className = 'modal-content';
        content.innerHTML = '<div class="modal-close" onclick="closeModal()">✕</div>' +
            '<div class="modal-title">' + title + '</div>' +
            '<div>' + contentHtml + '</div>';

        overlay.appendChild(content);
        document.body.appendChild(overlay);
    }

    function closeModal() {
        const modal = document.getElementById('modalOverlay');
        if (modal) modal.remove();
    }

    // ====== 背景粒子 ======
    function initParticles() {
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const maxParticles = 50;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: -Math.random() * 0.5 - 0.1,
                radius: Math.random() * 1.5 + 0.5,
                alpha: Math.random() * 0.3 + 0.1,
                color: ['#d4a843', '#4a90d9', '#d94a4a', '#4ad97a', '#9b59b6'][Math.floor(Math.random() * 5)]
            };
        }

        for (let i = 0; i < maxParticles; i++) {
            particles.push(createParticle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.y < -10) { p.y = canvas.height + 10; p.x = Math.random() * canvas.width; }
                if (p.x < -10) p.x = canvas.width + 10;
                if (p.x > canvas.width + 10) p.x = -10;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.fill();
            });

            ctx.globalAlpha = 1;
            requestAnimationFrame(animate);
        }

        animate();
    }

    // ====== 横置切换 ======
    function toggleHorizontal(cardEl) {
        cardEl.classList.toggle('horizontal');
        const isHorizontal = cardEl.classList.contains('horizontal');
        showToast(isHorizontal ? '武将已横置' : '武将已复原', 'info');
    }

    // ====== 骰子滚动 ======
    let isDiceRolling = false;
    function rollDice() {
        if (isDiceRolling) return;
        isDiceRolling = true;

        const dice = document.getElementById('dice');
        const resultValue = document.getElementById('diceResultValue');
        const resultRange = document.getElementById('diceResultRange');
        const diceMaxSelect = document.getElementById('diceMaxSelect');
        const maxNum = parseInt(diceMaxSelect.value);

        // 重置结果状态
        resultValue.classList.remove('popped');
        resultValue.textContent = '...';

        // 添加滚动动画
        dice.classList.add('rolling');

        // 生成随机数
        const randomNum = Math.floor(Math.random() * maxNum) + 1;

        // 动画结束后显示结果
        setTimeout(() => {
            dice.classList.remove('rolling');
            resultValue.textContent = randomNum;
            resultRange.textContent = '[1 - ' + maxNum + ']';

            // 结果弹出动画
            resultValue.classList.add('popped');
            setTimeout(() => {
                resultValue.classList.remove('popped');
            }, 500);

            isDiceRolling = false;
            showToast('骰子结果：' + randomNum + ' (1-' + maxNum + ')', 'success');
        }, 1500);
    }
